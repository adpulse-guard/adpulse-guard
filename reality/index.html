    :root { 
  --apg-bg: #1e1e2f;
  --apg-card: #2a2a3b;
  --apg-primary: #6366f1;
  --apg-primary-soft: #818cf8;
  --apg-text: #f3f4f6;
  --apg-muted: #9ca3af;
  --apg-danger: #ef4444;
}

body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(
    1200px 600px at top,
    #25253a,
    var(--apg-bg)
  );
  color: var(--apg-text);
  padding: 48px 20px;
  max-width: 720px;
  margin: auto;
}

.box {
  backdrop-filter: blur(6px);
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0)
  );
  background-color: var(--apg-card);
  padding: 28px;
  border-radius: 16px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.05);
}

h1 {
  font-size: 24px;
  margin-bottom: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.title-row{
  display:flex;
  align-items:center;
  gap:16px;
}

.title-row svg{
  width:140px;
  height:28px;
}

.title-row path{
  fill:none;
  stroke:#ef4444;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:260;
  stroke-dashoffset:260;
  animation:heartbeatMove 2.1s linear infinite;
  filter: drop-shadow(0 0 4px rgba(239,68,68,0.45));
}

p {
  margin-bottom: 10px;
  line-height: 1.65;
}

.highlight {
  color: var(--apg-primary);
  font-weight: 600;
}

.fade {
  opacity: 0.8;
  font-size: 13px;
  color: var(--apg-muted);
}

.quote {
  margin-top: 26px;
  font-style: italic;
  color: var(--apg-muted);
}

a.dashboard-link {
  color: var(--apg-primary-soft);
  text-decoration: none;
  border-bottom: 1px dashed rgba(129,140,248,0.6);
}

a.dashboard-link:hover {
  color: #c7d2fe;
  border-bottom-color: #c7d2fe;
}

.pulse-bar {
  font-family: monospace;
  letter-spacing:1px;
  font-size:12px;
  margin-left:6px;
  display:inline;
  vertical-align:middle;
}

.pulse-bar span {
  transition: opacity 0.3s;
}

@keyframes pulseBlink {
  0% { opacity:1 }
  50% { opacity:0.4 }
  100% { opacity:1 }
}

@keyframes scan {
0% { opacity:0.4 }
50% { opacity:1 }
100% { opacity:0.4 }
}

#pulseScoreValue {
animation:scan 2s infinite;
}

.critical {
  animation: pulseBlink 1s infinite;
}

@keyframes heartbeatMove {
  to {
    stroke-dashoffset:0;
  }
}

.heartbeat path {
  stroke:#ef4444;
  filter: drop-shadow(0 0 4px rgba(239,68,68,0.4));
  animation: heartbeatMove 2.3s linear infinite,
             pulseGlow 2s ease-in-out infinite;
}

.revenue-badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  background:rgba(239,68,68,0.15);
  color:#f87171;
  font-weight:600;
  margin-top:6px;
}

.section-divider{
  border-top:1px solid rgba(255,255,255,0.08);
  margin:16px 0;
}

@keyframes pulseGlow {
  0% { filter: drop-shadow(0 0 3px rgba(239,68,68,0.3)); }
  50% { filter: drop-shadow(0 0 8px rgba(239,68,68,0.6)); }
  100% { filter: drop-shadow(0 0 3px rgba(239,68,68,0.3)); }
}
  </style>

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function computePulseScore() {
  let score = 100;

  score -= issues * 6;
  score -= slots * 2;

  if (gptScriptMissing > 0) score -= 40;
  if (gptNotInitialized > 0) score -= 30;
  if (gptNoSlotRequests > 0) score -= 35;

  score -= phantom * 10;
  score -= noDomNoRequest * 8;
  score -= domFail * 8;
  score -= wrongNetwork * 12;
  score -= emptyResponse * 6;
  score -= unexpectedSize * 5;
  score -= neverRequested * 7;

  score -= containerCollapsed * 8;
  score -= layoutOverlap * 10;
  score -= visibilityImpaired * 10;

  if (loss > 0) score -= Math.min(25, Math.floor(loss / 20));

  return clamp(Math.round(score), 0, 100);
}

function pulseLabel(score) {
  if (score >= 85) return { label: "stable", emoji: "📡" };
  if (score >= 70) return { label: "irregular", emoji: "📡" };
  if (score >= 50) return { label: "unstable", emoji: "📡" };
  if (score >= 30) return { label: "weak", emoji: "📡" };
  return { label: "critical", emoji: "📡" };
}

function meterBar(score) {

const blocks = 10;
const filled = Math.floor(score / 10);

const colors = [
  "#f87171",   
  "#fb923c",   
  "#facc15",   
  "#a3e635",   
  "#4ade80"  
];

const color =
score >= 85 ? colors[4] :
score >= 70 ? colors[3] :
score >= 50 ? colors[2] :
score >= 30 ? colors[1] :
colors[0];

let bar = "";

for (let i = 0; i < blocks; i++) {
bar += i < filled
? `<span style="color:${color}">▓</span>`
: `<span style="opacity:0.25">▓</span>`;
}

return bar;

}

function animatePulseScore(score){

  const elScore = document.querySelector("#pulseScoreValue");
  if(!elScore) return;

  let current = 0;

  const interval = setInterval(()=>{

    current += 2;

    if(current >= score){
      current = score;
      clearInterval(interval);
    }

    elScore.textContent = current + "%";

  },20);

}
