<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Explorer</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <div class="flex items-center gap-8">

      <!-- BRAND -->
      <div class="flex items-center gap-2">
        <img src="Logo Shield.png" class="h-7 w-7" />
        <span class="text-sm font-semibold">AdPulse Guard</span>
      </div>

      <!-- NAV -->
      <nav class="flex gap-4 text-sm">
        <a id="overviewLink"
           href="index.html"
           class="text-gray-500 hover:text-indigo-600">
          Overview
        </a>

        <span class="text-indigo-600 font-medium border-b-2 border-indigo-600">
          Incident Explorer
        </span>
      </nav>

    </div>

  </div>
</header>

<!-- CONTENT -->
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- FILTERS -->
  <div class="bg-white rounded-xl shadow p-4 mb-6 flex gap-4 items-center">

    <input type="date"
           id="dateFilter"
           class="px-2 py-1 border rounded" />

    <select id="issueFilter"
            class="px-2 py-1 border rounded">
      <option value="">All incidents</option>
    </select>

  </div>

  <!-- LIST -->
  <div id="incidentList" class="space-y-4"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token || token === 'undefined') {
  document.body.innerHTML = 'Access denied';
  throw new Error('Invalid token');
}

const overviewLink = document.getElementById('overviewLink');

if (overviewLink) {

  let url = `index.html?token=${token}`;

  const date = params.get('date');
  const issue = params.get('issue');

  if (date) url += `&date=${date}`;
  if (issue) url += `&issue=${issue}`;

  overviewLink.href = url;
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxAD4aNij0ApHx21r68hq5TLx2k2r3VT9_obEe7I-EX_l3JGDQSnrY84LcA4QG8Ldf2ig/exec';

let allRows = [];
let activeDate = params.get('date') || '';
let selectedIssue = params.get('issue') || '';

const labelMap = {
  gpt_script_missing: 'GPT script missing',
  gpt_loaded_but_not_initialized: 'GPT loaded but not initialized',
  gpt_no_slot_requests: 'No GPT slot requests',
  wrong_network: 'Incorrect ad network ID',
  slot_not_registered: 'DOM slot not in GPT',
  defined_without_dom_no_request: 'GPT slot defined without DOM',
  phantom_slot_requested: 'Phantom slot requested',
  unexpected_size: 'Unexpected size',
  empty_response: 'No ad response returned',
  slot_never_requested: 'Slot visible but no ad request sent',
  layout_overlap: 'Layout overlap',
  ad_visibility_impaired: 'Ad visibility impaired',
  slot_container_collapsed: 'Slot container collapsed',
  token_invalid: 'Invalid security token',
  clientId_mismatch: 'Client ID mismatch',
  expectedNetworkId_mismatch: 'Network configuration mismatch',
  unauthorized_domain: 'Unauthorized domain access'
};
  function populateIssueFilter(rows) {

  const select = document.getElementById('issueFilter');

  const unique = new Set(
    rows.map(r => r.issueType).filter(Boolean)
  );

  unique.forEach(type => {
    const option = document.createElement('option');
    option.value = type;
    option.textContent = labelMap[type] || type;
    select.appendChild(option);
  });
}

function renderList(rows) {

  const container = document.getElementById('incidentList');

  if (!rows.length) {
  container.innerHTML = `
    <div class="text-sm text-gray-400">
      No incidents found
    </div>
  `;
  return;
}

  container.innerHTML = rows.map(r => {

  const severity = (r.severity || 'INFO').toUpperCase();

  const color =
    severity === 'HIGH' ? 'text-red-600' :
    severity === 'MEDIUM' ? 'text-orange-600' :
    'text-gray-500';

  return `
    <div class="bg-white rounded-xl shadow p-4 border border-gray-100">

      <!-- PAGE -->
      <div class="text-xs text-gray-400 mb-1 break-all">
        ${r.pageUrl || '—'}
      </div>

      <!-- ISSUE -->
      <div class="text-sm font-semibold ${color}">
        ${labelMap[r.issueType] || r.issueType}
      </div>

      <!-- SLOT -->
      <div class="text-xs text-gray-500 mt-1">
        Slot: ${r.slotId || '—'}
      </div>

      <!-- FOOTER -->
      <div class="flex justify-between items-center mt-3">

        <div class="text-sm font-medium text-gray-700">
          $${Number(r.estimatedDailyRevenueRisk || 0).toFixed(2)}
        </div>

        <div class="text-xs text-gray-400">
          ${new Date(r.receivedAt).toLocaleTimeString()}
        </div>

      </div>

    </div>
  `;
}).join('');

}

function applyFilters() {

  let rows = allRows;

  if (activeDate) {
    rows = rows.filter(r =>
      r.receivedAt.startsWith(activeDate)
    );
  }

  if (selectedIssue) {
    rows = rows.filter(r =>
      r.issueType === selectedIssue
    );
  }

  renderGrouped(rows);
}

function renderGrouped(rows) {

  const container = document.getElementById('incidentList');

  if (!rows.length) {
    container.innerHTML = `
      <div class="text-sm text-gray-400">
        No incidents found
      </div>
    `;
    return;
  }

  // 🧠 GROUP BY PAGE
  const pageMap = new Map();

  rows.forEach(r => {

    const page = r.pageUrl || 'Unknown page';

    if (!pageMap.has(page)) {
      pageMap.set(page, {
        incidents: [],
        total: 0
      });
    }

    const risk = Number(r.estimatedDailyRevenueRisk || 0);

    pageMap.get(page).incidents.push(r);
    pageMap.get(page).total += risk;
  });

  // 🔥 SORT pages by total revenue DESC
  const sortedPages = Array.from(pageMap.entries())
    .sort((a, b) => b[1].total - a[1].total);

  // 🎨 RENDER
  container.innerHTML = sortedPages.map(([page, data]) => {

    const shortPage = page.replace(/^https?:\/\/(www\.)?/, '').slice(0, 60);

    return `
      <div class="bg-white rounded-xl shadow border border-gray-100">

        <!-- PAGE HEADER -->
        <div 
          class="p-4 border-b flex justify-between items-center cursor-pointer hover:bg-gray-50"
          onclick="togglePage('${btoa(page)}')"
        >

          <div class="flex items-center gap-2 text-sm font-medium text-gray-700 break-all">
            <span id="arrow-${btoa(page)}">▶</span>
            ${shortPage}
          </div>

          <div class="text-sm font-semibold text-red-600">
            $${data.total.toFixed(2)}
          </div>

        </div>

        <!-- INCIDENTS -->
        <div id="group-${btoa(page)}" class="divide-y hidden">

          ${data.incidents
            .sort((a,b) =>
              Number(b.estimatedDailyRevenueRisk || 0) -
              Number(a.estimatedDailyRevenueRisk || 0)
            )
            .map(r => {

              const severity = (r.severity || 'INFO').toUpperCase();

              const color =
                severity === 'HIGH' ? 'text-red-600' :
                severity === 'MEDIUM' ? 'text-orange-600' :
                'text-gray-500';

              return `
                <div class="p-3 flex justify-between items-center text-sm">

                  <div>
                    <div class="font-medium ${color}">
                      ${labelMap[r.issueType] || r.issueType}
                    </div>

                    <div class="text-xs text-gray-400">
                      ${r.slotId || '—'}
                    </div>
                  </div>

                  <div class="text-right">
                    <div class="text-gray-700">
                      $${Number(r.estimatedDailyRevenueRisk || 0).toFixed(2)}
                    </div>
                    <div class="text-xs text-gray-400">
                      ${new Date(r.receivedAt).toLocaleTimeString()}
                    </div>
                  </div>

                </div>
              `;
            }).join('')}

        </div>

      </div>
    `;
  }).join('');
}

document.getElementById('incidentList').innerHTML =
  `<div class="text-sm text-gray-400">Loading...</div>`;

document.getElementById('dateFilter')
  .addEventListener('change', e => {
    activeDate = e.target.value;
    applyFilters();
  });

document.getElementById('issueFilter')
  .addEventListener('change', e => {
    selectedIssue = e.target.value;
    applyFilters();
  });

fetch(`${SHEET_URL}?token=${token}`)
  .then(r => r.json())
  .then(j => {
  console.log('API RESPONSE:', j);

  allRows = j.data || [];

  populateIssueFilter(allRows);
  if (activeDate) {
      document.getElementById('dateFilter').value = activeDate;
    }

    if (selectedIssue) {
      document.getElementById('issueFilter').value = selectedIssue;
    }

  applyFilters();
});
function togglePage(id) {
  const el = document.getElementById(`group-${id}`);
  const arrow = document.getElementById(`arrow-${id}`);

  if (!el) return;

  const isHidden = el.classList.contains('hidden');

  el.classList.toggle('hidden');

  if (arrow) {
    arrow.textContent = isHidden ? '▼' : '▶';
  }
}
</script>

</body>
</html>
