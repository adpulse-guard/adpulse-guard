<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
  if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.classList.add('dark');
}
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: { 
          darkcard: '#2a2a3b',
          darkbg: '#1e1e2f'
        }
      }
    }
  };
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Explorer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-50 dark:bg-darkbg text-gray-900 dark:text-white font-sans min-h-screen">

<!-- HEADER -->
<header class="bg-white dark:bg-darkcard shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    
    <div class="flex items-center gap-8">

      <!-- BRAND -->
      <div class="flex items-center gap-2">
        <img src="Logo Shield.png" class="h-7 w-7" />
        <span class="text-sm font-semibold tracking-wide">
          AdPulse Guard
        </span>
      </div>

      <!-- NAV -->
      <nav class="flex items-center gap-4 text-sm">

        <a id="overviewLink"
           href="index.html"
           class="px-2 py-1 rounded
                  text-gray-500 hover:text-indigo-600 hover:bg-gray-100
                  dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-indigo-300">
          Overview
        </a>

        <a
           class="px-2 py-1 rounded
                  text-indigo-600 font-medium
                  border-b-2 border-indigo-600
                  dark:text-indigo-300 dark:border-indigo-300">
          Incident Explorer
        </a>

      </nav>
    </div>

    <div class="flex flex-wrap items-center gap-2 text-xs md:flex-nowrap">

      <span
        class="px-2 py-0.5 rounded bg-indigo-50 text-indigo-600
               dark:bg-indigo-900/30 dark:text-indigo-300
               uppercase tracking-wide">
        Explorer view
      </span>

      <div class="flex items-center gap-2">
        <input
          type="date"
          id="dateFilter"
          class="px-2 py-1 border rounded
                 bg-white text-gray-900
                 dark:bg-darkcard dark:text-white"
        />
        <button id="clearDate" class="text-indigo-500 hover:underline">
          Clear
        </button>
      </div>

      <button
        id="darkModeBtn"
        class="ml-2 px-2 py-1 rounded bg-gray-200 dark:bg-gray-700"
      >
        <span id="modeLabel">🌙</span>
      </button>

    </div>
  </div>
</header>

<!-- CONTENT -->
<div class="max-w-6xl mx-auto py-8 px-4">

<!-- FILTER BAR  -->
<div class="bg-white dark:bg-darkcard rounded-xl shadow p-4 mb-4 flex flex-wrap items-center gap-3">

  <span class="text-xs uppercase tracking-wide text-gray-500">
    Filter by Incident Type
  </span>

  <select
    id="issueFilter"
    class="px-2 py-1 text-sm border rounded dark:bg-darkcard"
  >
    <option value="">All Incident Types</option>
  </select>

  <button
    id="clearIssueFilter"
    class="hidden inline-flex items-center justify-center
           w-5 h-5 rounded-full
           bg-indigo-50 text-indigo-600
           hover:bg-indigo-100 hover:text-indigo-700
           dark:bg-indigo-900/30 dark:text-indigo-300
           dark:hover:bg-indigo-900/50
           text-xs leading-none"
  >
    ✕
  </button>

  <span
    id="issueFilterNote"
    class="text-xs text-gray-400 hidden"
  ></span>

</div>

<div id="incidentList" class="space-y-4"></div>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token || token === 'undefined') {
  document.body.innerHTML = 'Access denied';
  throw new Error('Invalid token');
}

const overviewLink = document.getElementById('overviewLink');

if (overviewLink) {

  let url = `index.html?token=${token}`;

  const date = params.get('date');
  const issue = params.get('issue');

  if (date) url += `&date=${date}`;
  if (issue) url += `&issue=${issue}`;

  overviewLink.href = url;
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxAD4aNij0ApHx21r68hq5TLx2k2r3VT9_obEe7I-EX_l3JGDQSnrY84LcA4QG8Ldf2ig/exec';

let allRows = [];
let activeDate = params.get('date') || '';
let selectedIssue = params.get('issue') || '';
const clearIssueFilterBtn = document.getElementById('clearIssueFilter');
const issueFilterNote = document.getElementById('issueFilterNote');

function updateIssueClearVisibility() {
  if (selectedIssue) {
    clearIssueFilterBtn.classList.remove('hidden');
  } else {
    clearIssueFilterBtn.classList.add('hidden');
  }
}

const labelMap = {
  gpt_script_missing: 'GPT script missing',
  gpt_loaded_but_not_initialized: 'GPT loaded but not initialized',
  gpt_no_slot_requests: 'No GPT slot requests',
  wrong_network: 'Incorrect ad network ID',
  slot_not_registered: 'DOM slot not in GPT',
  defined_without_dom_no_request: 'GPT slot defined without DOM',
  phantom_slot_requested: 'Phantom slot requested',
  unexpected_size: 'Unexpected size',
  empty_response: 'No ad response returned',
  slot_never_requested: 'Slot visible but no ad request sent',
  layout_overlap: 'Layout overlap',
  ad_visibility_impaired: 'Ad visibility impaired',
  slot_container_collapsed: 'Slot container collapsed',
  token_invalid: 'Invalid security token',
  clientId_mismatch: 'Client ID mismatch',
  expectedNetworkId_mismatch: 'Network configuration mismatch',
  unauthorized_domain: 'Unauthorized domain access'
};
const ISSUE_GROUPS = {
  DELIVERY: [
    'gpt_script_missing',
    'gpt_loaded_but_not_initialized',
    'gpt_no_slot_requests',
    'empty_response',
    'phantom_slot_requested',
    'defined_without_dom_no_request',
    'slot_not_registered',
    'slot_never_requested',
    'wrong_network'
  ],
  LAYOUT: [
    'unexpected_size',
    'layout_overlap',
    'ad_visibility_impaired',
    'slot_container_collapsed'
  ]
};
const SUGGESTED_CHECKS = {
    slot_not_registered: [
      'Verify that the ad slot is registered in GPT',
      'Check that the slot DOM ID exists on the page',
      'Confirm the slot is initialized after GPT loads'
    ],
    phantom_slot_requested: [
    'Verify that the slot container exists in the DOM',
    'Check breakpoint and layout conditions',
    'Confirm slot ID consistency between GPT and DOM'
    ],
    defined_without_dom_no_request: [
    'Check if the slot is breakpoint-specific',
    'Verify conditional display() execution',
    'Confirm that refresh() is triggered when expected'
    ],
    wrong_network: [
      'Verify the network code used for this ad request',
      'Check for conflicting GPT initializations on the page'
    ],
    unexpected_size: [
      'Verify the slot sizes defined in GPT',
      'Check that the slot renders at the expected size',
      'Confirm line item eligibility for this slot size'
    ],
    empty_response: [
      'Check line item targeting and pacing',
      'Verify that the ad unit is active and eligible for delivery',
      'Review frequency caps or delivery limits on active campaigns'
    ],
    gpt_script_missing: [
    'Verify that the GPT script is included on the page',
    'Check for script blocking by CSP or consent tools',
    'Confirm no JS errors are preventing GPT load'
  ],
    gpt_loaded_but_not_initialized: [
    'Verify that googletag.cmd.push() executes correctly',
    'Check for JS errors before GPT initialization',
    'Confirm consent or CMP does not block GPT activation'
  ],
    gpt_no_slot_requests: [
    'Verify that display() or refresh() is executed',
    'Check conditional slot rendering logic',
    'Confirm slots are not blocked by breakpoint conditions'
  ],
  slot_container_collapsed: [
    'Verify CSS rules affecting slot container height',
    'Check for layout shifts collapsing the ad div',
    'Confirm slot is not hidden by conditional styling'
  ],
  slot_never_requested: [
  'Verify that googletag.display() is executed for this slot',
  'Check lazy loading or scroll trigger logic',
  'Confirm that no JS errors prevent slot request'
],
  };


function buildIssueDropdown(issueCounts) {

  const select = document.getElementById('issueFilter');
  select.innerHTML = `<option value="">All Incident Types</option>`;

  Object.entries(ISSUE_GROUPS).forEach(([groupKey, issues]) => {

    const groupHeader = document.createElement('option');
    const groupTitles = {
  DELIVERY: '— Delivery & Rendering —',
  LAYOUT: '— Layout & Visibility —'
};

groupHeader.textContent = groupTitles[groupKey];
    groupHeader.disabled = true;
    if (groupKey === 'DELIVERY') {
  groupHeader.style.color = '#6366f1';
  groupHeader.style.fontWeight = '600';
}

if (groupKey === 'LAYOUT') {
  groupHeader.style.color = '#d97706';
  groupHeader.style.fontWeight = '600';
}

    select.appendChild(groupHeader);

    issues.forEach(issueKey => {

      const label = labelMap[issueKey];
      if (!label) return;

      const count = issueCounts[issueKey] || 0;

      const option = document.createElement('option');
      option.value = issueKey;
      option.textContent = `${label} (${count})`;
      if (count === 0) {
      option.disabled = true;
      option.style.color = '#9ca3af';
}

      select.appendChild(option);

    });

  });
}

function renderList(rows) {

  const container = document.getElementById('incidentList');

  if (!rows.length) {
  container.innerHTML = `
    <div class="text-sm text-gray-400 dark:text-gray-400">
      No incidents found
    </div>
  `;
  return;
}

  container.innerHTML = rows.map(r => {

  const severity = (r.severity || 'INFO').toUpperCase();

  const color =
    severity === 'HIGH' ? 'text-red-600' :
    severity === 'MEDIUM' ? 'text-orange-600' :
    'text-gray-500';

  return `
    <div class="bg-white dark:bg-darkcard rounded-lg shadow-sm border border-gray-200 dark:border-gray-600/30">

      <!-- PAGE -->
      <div class="text-xs text-gray-400 dark:text-gray-400 mb-1 break-all">
        ${r.pageUrl || '—'}
      </div>

      <!-- ISSUE -->
      <div class="text-sm font-semibold ${color}">
        ${labelMap[r.issueType] || r.issueType}
      </div>

      <!-- SLOT -->
      <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
        Slot: ${r.slotId || '—'}
      </div>

      <!-- FOOTER -->
      <div class="flex justify-between items-center mt-3">

        <div class="text-sm font-medium text-gray-700 dark:text-gray-200">
          $${Number(r.estimatedDailyRevenueRisk || 0).toFixed(2)}
        </div>

        <div class="text-xs text-gray-400 dark:text-gray-400">
          ${new Date(r.receivedAt).toLocaleTimeString()}
        </div>

      </div>

    </div>
  `;
}).join('');

}

function applyFilters() {

  let rows = allRows;

  if (activeDate) {
    rows = rows.filter(r =>
      r.receivedAt.startsWith(activeDate)
    );
  }

  // ✅ COUNT IZ NEFILTRIRANIH (po issue)
  const issueCounts = {};
  const uniqueIssues = new Set();

  rows.forEach(r => {
    if (!r.issueType) return;

    const key = `${r.pageUrl}__${r.issueType}`;

    if (!uniqueIssues.has(key)) {
      uniqueIssues.add(key);

      issueCounts[r.issueType] =
        (issueCounts[r.issueType] || 0) + 1;
    }
  });

  // 👉 sad filtriraš po issue
  if (selectedIssue) {
    rows = rows.filter(r =>
      r.issueType === selectedIssue
    );
  }

  buildIssueDropdown(issueCounts);
  if (selectedIssue && !issueCounts[selectedIssue]) {
  selectedIssue = '';
}
  if (selectedIssue) {
    document.getElementById('issueFilter').value = selectedIssue;
  }

  document.getElementById('issueFilter').disabled =
    Object.keys(issueCounts).length === 0;

  renderGrouped(rows);
}

function renderGrouped(rows) {

  const container = document.getElementById('incidentList');

  if (!rows.length) {
    container.innerHTML = `
      <div class="text-sm text-gray-400 dark:text-gray-400">
        No incidents found
      </div>
    `;
    return;
  }

  // 🧠 GROUP BY PAGE
  const pageMap = new Map();

  rows.forEach(r => {

    const page = r.pageUrl || 'Unknown page';

    if (!pageMap.has(page)) {
      pageMap.set(page, {
        incidents: [],
        total: 0
      });
    }

    const risk = Number(r.estimatedDailyRevenueRisk || 0);

    pageMap.get(page).incidents.push(r);

if (!pageMap.get(page).totalSet) {
  pageMap.get(page).total = Number(r.estimatedDailyRevenueRisk || 0);
  pageMap.get(page).totalSet = true;
}
  });

  // 🔥 SORT pages by total revenue DESC
  const sortedPages = Array.from(pageMap.entries())
    .sort((a, b) => b[1].total - a[1].total);

  // 🎨 RENDER
  container.innerHTML = sortedPages.map(([page, data]) => {

    const displayPage = page
  .replace(/^https?:\/\/(www\.)?/, '')
  .replace(/\/$/, '')
  .slice(0, 60);

    return `
      <div class="bg-white dark:bg-darkcard rounded-lg shadow-sm border border-gray-200 dark:border-gray-600/30">

        <!-- PAGE HEADER -->
        <div 
          class="px-4 py-2 border-b flex justify-between items-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
          onclick="togglePage('${btoa(page)}')"
        >

          <div class="flex items-center gap-2 text-sm font-medium text-gray-700 dark:text-gray-200 break-words">
            <span id="arrow-${btoa(page)}" class="text-xs text-gray-400">▶</span>
            <div class="flex items-center gap-1 text-sm">
              <span class="text-gray-400 text-xs">Page:</span>
              <a href="${page}" target="_blank"
                 onclick="event.stopPropagation();"
                 class="hover:underline text-indigo-600">
                 ${displayPage}
                </a>
            </div>
          </div>

          <div class="text-sm font-semibold text-red-600">
            $${data.total.toFixed(2)}
          </div>

        </div>

        <!-- INCIDENTS -->
        <div id="group-${btoa(page)}" class="divide-y hidden">

         ${(() => {

  const issueMap = new Map();

const pageRevenue = Math.max(
  ...data.incidents.map(r => Number(r.estimatedDailyRevenueRisk || 0))
);

const uniqueSlots = new Set(
  data.incidents
    .map(r => r.slotId)
    .filter(Boolean)
);
const slotCount = uniqueSlots.size || 1;

const valuePerSlot = pageRevenue / slotCount;

data.incidents.forEach(r => {
  const issue = r.issueType || 'unknown';

  if (!issueMap.has(issue)) {
    issueMap.set(issue, {
      slots: new Set(),
      total: 0
    });
  }

  if (!issueMap.get(issue).slots.has(r.slotId)) {
    issueMap.get(issue).slots.add(r.slotId);

    issueMap.get(issue).total += valuePerSlot;
  }
});
  
  return Array.from(issueMap.entries())
    .sort((a,b) => b[1].total - a[1].total)
    .map(([issue, obj]) => {
      const uniqueId = btoa(page + issue + obj.total);
      const groupColor =
        ISSUE_GROUPS.DELIVERY.includes(issue) ? 'text-red-600' :
        ISSUE_GROUPS.LAYOUT.includes(issue) ? 'text-orange-500' :
        'text-gray-500';

      return `
<div class="relative pl-4 pr-4 py-4 bg-white dark:bg-darkcard rounded-lg shadow-sm hover:shadow-md transition space-y-4">
<div class="absolute top-3 right-3 text-xs font-semibold text-gray-700 dark:text-gray-200">
  $${obj.total.toFixed(2)}
</div>
  <!-- SEVERITY BAR -->
  ${(() => {
  const severity = (
    data.incidents.find(r => r.issueType === issue)?.severity || 'INFO'
  ).toUpperCase();

  const color =
    severity === 'HIGH' ? 'bg-red-500' :
    severity === 'MEDIUM' ? 'bg-orange-400' :
    'bg-gray-400';

  return `<div class="absolute left-0 top-0 bottom-0 w-1 ${color} rounded-l"></div>`;
})()}

    <!-- ISSUE TITLE -->
    <div class="font-semibold text-sm ${
  ISSUE_GROUPS.DELIVERY.includes(issue)
    ? 'text-red-600'
    : 'text-orange-500'
}">
      ${labelMap[issue] || issue}
    </div>

    <!-- AFFECTED SLOTS -->
    <div class="pl-2 text-sm">
  <div class="text-gray-500 dark:text-gray-400 text-xs mb-1 uppercase tracking-wide">
    Affected Slots:
  </div>
  <ul class="space-y-0.5">
        ${Array.from(obj.slots).map(slot => `
          <li>• ${slot}</li>
        `).join('')}
      </ul>
    </div>

    <!-- AD UNIT PATH -->
      ${(() => {
  const paths = [...new Set(
    data.incidents
      .filter(r => r.issueType === issue)
      .map(r => r.path)
      .filter(Boolean)
  )];

  if (!paths.length) return '';

  return `
    <div class="pl-2 text-sm">
  <div class="text-gray-500 dark:text-gray-400 text-xs mb-1 uppercase tracking-wide">
    Ad unit path:
  </div>
  <ul class="space-y-0.5">
        ${paths.map(p => `<li>• ${p}</li>`).join('')}
      </ul>
    </div>
  `;
})()}

    <!-- SUGGESTED CHECKS -->
    <div class="pl-2 text-sm">

  <button
    onclick="toggleChecks('${uniqueId}')"
    class="text-xs text-indigo-500 hover:underline"
  >
    Show suggested checks
  </button>

  <div id="checks-${uniqueId}" class="hidden mt-2">

    <div class="text-gray-500 dark:text-gray-400 text-xs mb-1 uppercase tracking-wide">
      Suggested checks
    </div>

    <ul class="space-y-0.5">
      ${
        (SUGGESTED_CHECKS[issue] || []).map(c => `<li>• ${c}</li>`).join('')
      }
    </ul>

  </div>

</div>
</div>
`;
    }).join('');
})()}

        </div>
      </div>
    `;
  }).join('');

}

document.getElementById('incidentList').innerHTML =
  `<div class="text-sm text-gray-400 dark:text-gray-400">Loading...</div>`;

// DATE FILTER
document.getElementById('dateFilter')
  .addEventListener('change', e => {
    activeDate = e.target.value;

const url = new URL(window.location);

if (activeDate) {
  url.searchParams.set('date', activeDate);
} else {
  url.searchParams.delete('date');
}

window.history.replaceState({}, '', url);

applyFilters();
  });

// CLEAR DATE
const clearDate = document.getElementById('clearDate');

clearDate.addEventListener('click', () => {
  activeDate = '';
  const url = new URL(window.location);
  url.searchParams.delete('date');
  window.history.replaceState({}, '', url);
  document.getElementById('dateFilter').value = '';
  applyFilters();
});

// ISSUE FILTER
document.getElementById('issueFilter')
  .addEventListener('change', e => {
    selectedIssue = e.target.value;

const url = new URL(window.location);

if (selectedIssue) {
  url.searchParams.set('issue', selectedIssue);
} else {
  url.searchParams.delete('issue');
}

window.history.replaceState({}, '', url);

if (selectedIssue) {
  const label = labelMap[selectedIssue] || selectedIssue;
  issueFilterNote.textContent = `Showing impact: ${label}`;
  issueFilterNote.classList.remove('hidden');
} else {
  issueFilterNote.classList.add('hidden');
}

updateIssueClearVisibility();
applyFilters();
  });

fetch(`${SHEET_URL}?token=${token}`)
  .then(r => r.json())
  .then(j => {
  console.log('API RESPONSE:', j);

  allRows = j.data || [];


if (activeDate) {
  document.getElementById('dateFilter').value = activeDate;
}
if (selectedIssue) {
  document.getElementById('issueFilter').value = selectedIssue;

  const label = labelMap[selectedIssue] || selectedIssue;
  issueFilterNote.textContent = `Showing impact: ${label}`;
  issueFilterNote.classList.remove('hidden');
}
  applyFilters();
updateIssueClearVisibility();
})
function toggleChecks(id) {
  const el = document.getElementById(`checks-${id}`);
  if (!el) return;
  el.classList.toggle('hidden');
}
function togglePage(id) {
  const el = document.getElementById(`group-${id}`);
  const arrow = document.getElementById(`arrow-${id}`);

  if (!el) return;

  const isHidden = el.classList.contains('hidden');

  el.classList.toggle('hidden');

  if (arrow) {
    arrow.textContent = isHidden ? '▼' : '▶';
  }
}

const darkModeBtn = document.getElementById('darkModeBtn');
const modeLabel = document.getElementById('modeLabel');

if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.classList.add('dark');
}

modeLabel.textContent =
  document.documentElement.classList.contains('dark')
    ? 'Light Mode'
    : 'Dark Mode';

darkModeBtn.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  modeLabel.textContent = isDark ? 'Light Mode' : 'Dark Mode';
});
clearIssueFilterBtn.addEventListener('click', () => {

  selectedIssue = '';

  const url = new URL(window.location);
  url.searchParams.delete('issue');
  window.history.replaceState({}, '', url);

  document.getElementById('issueFilter').value = '';
  issueFilterNote.classList.add('hidden');

  updateIssueClearVisibility();
  applyFilters();

});
</script>

</body>
</html>
