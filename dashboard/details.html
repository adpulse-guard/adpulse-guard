<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Explorer</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <div class="flex items-center gap-8">

      <!-- BRAND -->
      <div class="flex items-center gap-2">
        <img src="Logo Shield.png" class="h-7 w-7" />
        <span class="text-sm font-semibold">AdPulse Guard</span>
      </div>

      <!-- NAV -->
      <nav class="flex gap-4 text-sm">
        <a href="index.html" class="text-gray-500 hover:text-indigo-600">
          Overview
        </a>

        <span class="text-indigo-600 font-medium border-b-2 border-indigo-600">
          Incident Explorer
        </span>
      </nav>

    </div>

  </div>
</header>

<!-- CONTENT -->
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- FILTERS -->
  <div class="bg-white rounded-xl shadow p-4 mb-6 flex gap-4 items-center">

    <input type="date"
           id="dateFilter"
           class="px-2 py-1 border rounded" />

    <select id="issueFilter"
            class="px-2 py-1 border rounded">
      <option value="">All incidents</option>
    </select>

  </div>

  <!-- LIST -->
  <div id="incidentList" class="space-y-4"></div>

</div>

<script>

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxAD4aNij0ApHx21r68hq5TLx2k2r3VT9_obEe7I-EX_l3JGDQSnrY84LcA4QG8Ldf2ig/exec';

let allRows = [];
let activeDate = '';
let selectedIssue = '';

const labelMap = {
  gpt_script_missing: 'GPT script missing',
  empty_response: 'No ad response',
  wrong_network: 'Wrong network',
};

function renderList(rows) {

  const container = document.getElementById('incidentList');

  if (!rows.length) {
    container.innerHTML = `
      <div class="text-sm text-gray-400">
        No incidents found
      </div>
    `;
    return;
  }

  container.innerHTML = rows.map(r => {

    const severity = (r.severity || 'INFO').toUpperCase();

    const color =
      severity === 'HIGH' ? 'text-red-600' :
      severity === 'MEDIUM' ? 'text-orange-600' :
      'text-gray-500';

    return `
      <div class="bg-white rounded-xl shadow p-4">

        <div class="flex justify-between items-start">

          <div>
            <div class="text-sm font-semibold ${color}">
              ${labelMap[r.issueType] || r.issueType}
            </div>

            <div class="text-xs text-gray-500 mt-1">
              Slot: ${r.slotId || '—'}
            </div>

            <div class="text-xs text-gray-500">
              Page: ${r.pageUrl || '—'}
            </div>
          </div>

          <div class="text-right text-xs text-gray-400">
            ${new Date(r.receivedAt).toLocaleTimeString()}
          </div>

        </div>

        <div class="mt-2 text-sm text-gray-700">
          $${Number(r.estimatedDailyRevenueRisk || 0).toFixed(2)}
        </div>

      </div>
    `;
  }).join('');

}

function applyFilters() {

  let rows = allRows;

  if (activeDate) {
    rows = rows.filter(r =>
      r.receivedAt.startsWith(activeDate)
    );
  }

  if (selectedIssue) {
    rows = rows.filter(r =>
      r.issueType === selectedIssue
    );
  }

  renderList(rows);
}

document.getElementById('dateFilter')
  .addEventListener('change', e => {
    activeDate = e.target.value;
    applyFilters();
  });

document.getElementById('issueFilter')
  .addEventListener('change', e => {
    selectedIssue = e.target.value;
    applyFilters();
  });

fetch(SHEET_URL)
  .then(r => r.json())
  .then(j => {
    allRows = j.data || [];

    renderList(allRows);
  });

</script>

</body>
</html>
